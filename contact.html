<body>
    <div id="navbar-include"></div>

    <section class="contact-header">
        <h2 class="group-label">Let's Connect</h2>
        <div class="contact-cta">
            <p>目前開放技術諮詢與遠端合作洽談。</p>

    <main class="container">
        <section class="contact-group">
            <h3 class="sub-title">技術筆記與開發社群</h3>

            <div class="contact-grid">
                <a href="https://medium.com" target="_blank" rel="noopener noreferrer" class="contact-card blog-card">

                <a href="https://github.com/yourid" target="_blank" rel="noopener noreferrer" class="contact-card">
                    <i class="fab fa-github"></i>
                    <h3>GitHub</h3>
                    <p>追蹤我的開源貢獻與代碼專案</p>
                </a>

                <a href="https://youtube.com/@yourid" target="_blank" rel="noopener noreferrer" class="contact-card">
                    <i class="fab fa-youtube"></i>
                    <h3>YouTube</h3>
                    <p>觀看技術教學與專案展示影片</p>
                </a>

        </section>

        <hr class="section-divider">

        <section class="contact-group">
            <h3 class="sub-title">專業聯繫與簡歷</h3>
            <div class="contact-grid">
                <a href="assets/resume.pdf" download class="contact-card resume-card">
                    <i class="fas fa-file-pdf"></i>
                    <h3>下載微簡歷</h3>
                    <p>詳細技術棧與專案經歷</p>

                    <i class="fas fa-envelope"></i>
                    <h3>Email</h3>
                    <p>sychen@alum.ccu.edu.tw</p>
                </a>

                <a href="https://linkedin.com/in/yourid" target="_blank" rel="noopener noreferrer" class="contact-card">
                    <i class="fab fa-linkedin"></i>
                    <h3>LinkedIn</h3>
                    <p>查看我的職涯與專業認證</p>
                </a>

                <a href="https://www.104.com.tw/profile/yourid" target="_blank" rel="noopener noreferrer" class="contact-card">

                    <h3>104 求職網</h3>

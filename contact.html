<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聯絡我 | Engineer Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="contact.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div id="navbar-include"></div>

    <main class="container">
        <section class="contact-group">
            <h3 class="sub-title">技術筆記與開發社群</h3>

            <div class="contact-grid">
                <a href="https://medium.com" target="_blank" class="contact-card blog-card">
                    <i class="fab fa-medium"></i>
                    <h3>Medium Blog</h3>
                    <p>分享技術深度解析與開發筆記</p>
                </a>

                <a href="https://github.com/yourid" target="_blank" class="contact-card">
                    <i class="fab fa-github"></i>
                    <h3>GitHub</h3>
                    <p>追蹤我的開源貢獻與代碼專案</p>
                </a>
            </div>
        </section>

        <hr class="section-divider">

        <section class="contact-group">
            <h3 class="sub-title">專業聯繫與簡歷</h3>
            <div class="contact-grid">
                <a href="assets/resume.pdf" download class="contact-card resume-card">
                    <i class="fas fa-file-pdf"></i>
                    <h3>下載微簡歷</h3>
                    <p>PDF 格式，包含詳細技術棧與專案經歷</p>
                    <span class="card-tag">Resume</span>
                </a>

                <a href="mailto:email@example.com" class="contact-card">
                    <i class="fas fa-envelope"></i>
                    <h3>Email</h3>
                    <p>email@example.com</p>
                </a>

                <a href="https://linkedin.com/in/yourid" target="_blank" class="contact-card">
                    <i class="fab fa-linkedin"></i>
                    <h3>LinkedIn</h3>
                    <p>查看我的職涯與專業認證</p>
                </a>
            </div>
        </section>

        <section class="contact-header">
            <h2 class="group-label">Let's Connect</h2>
            <div class="contact-cta">
                <p>目前開放技術諮詢與遠端合作洽談。</p>
                <p>如果您對我的專案感興趣，或有任何技術交流的機會，歡迎隨時聯繫！</p>
            </div>
        </section>

    </main>

    <script src="script.js"></script>
</body>

</html>
